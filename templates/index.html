<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' fill='%233b82f6'><path d='M192 128l0 128c0 35.3 28.7 64 64 64s64-28.7 64-64l0-128c0-35.3-28.7-64-64-64s-64 28.7-64 64zm-32 0c0-53 43-96 96-96s96 43 96 96l0 128c0 53-43 96-96 96s-96-43-96-96l0-128zM96 224c0-8.8-7.2-16-16-16s-16 7.2-16 16c0 82.3 62.4 150 142.4 158.7l0 53.3-38.4 0c-8.8 0-16 7.2-16 16s7.2 16 16 16l112 0c8.8 0 16-7.2 16-16s-7.2-16-16-16l-38.4 0 0-53.3c80-8.7 142.4-76.4 142.4-158.7c0-8.8-7.2-16-16-16s-16 7.2-16 16c0 61.9-50.1 112-112 112s-112-50.1-112-112zM256 160c8.8 0 16 7.2 16 16l0 64c0 8.8-7.2 16-16 16s-16-7.2-16-16l0-64c0-8.8 7.2-16 16-16zm-64 32c8.8 0 16 7.2 16 16l0 32c0 8.8-7.2 16-16 16s-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16zm128 0c8.8 0 16 7.2 16 16l0 32c0 8.8-7.2 16-16 16s-16-7.2-16-16l0-32c0-8.8 7.2-16 16-16z'/></svg>">
    
    <title>SpeakLanka - Voice Translator</title>
    <meta name="description" content="SpeakLanka.AI is an advanced AI voice assistant that speaks and understands Sinhalese. Experience seamless Sinhala speech-to-text and text-to-speech.">
    <meta name="keywords" content="SpeakLanka, SpeakLanka AI, Sinhala AI, Voice Assistant Sri Lanka, Sinhala ChatBot, Groq Sinhala">
    <meta name="author" content="Nipun">

    <link rel="stylesheet" href="{{ url_with_static_path if url_for else '' }}/static/style.css" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-microphone-lines"></i> SpeakLanka AI</h1>
        <p class="subtitle">Sinhala ↔ English Voice Translator</p>
        
        <div class="lang-controls">
            <span id="src-label" class="active-lang">English</span>
            <button id="switch-btn" class="icon-btn"><i class="fa-solid fa-right-left"></i></button>
            <span id="target-label">Sinhala</span>
        </div>

        <div class="translator-box">
            <div class="box-input">
                <textarea id="input-text" placeholder="Type something or use the mic..."></textarea>
                <div class="action-bar">
                    <div style="display: flex; gap: 8px;">
                        <button id="mic-btn" class="action-btn mic-off"><i class="fa-solid fa-microphone"></i></button>
                        <button id="upload-btn" class="action-btn" style="background: #22c55e;"><i class="fa-solid fa-image"></i></button>
                        <input type="file" id="image-file" accept="image/*" style="display: none;">
                    </div>
                    <div>
                        <button id="translate-btn" class="main-btn">Translate</button>
                        <button id="ai-btn" class="main-btn" style="background: #a855f7; margin-left: 10px;"><i class="fa-solid fa-robot"></i> Ask AI</button>
                    </div>
                </div>
            </div>
            
            <div class="box-output">
                <div id="output-text" class="placeholder-text">Translation will appear here...</div>
                <div class="action-bar justify-end">
                    <button id="speak-btn" class="action-btn" disabled><i class="fa-solid fa-volume-high"></i></button>
                </div>
            </div>
            
        </div>
    </div>

    <script src="/static/script.js"></script>
    <audio id="bg-audio" style="display: none;"></audio>    
</body>
</html>
