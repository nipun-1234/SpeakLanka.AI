<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512' fill='%233b82f6'><path d='M128 176c0-17.7-14.3-32-32-32s-32 14.3-32 32v160c0 17.7 14.3 32 32 32s32-14.3 32-32V176zm288 0c0-17.7-14.3-32-32-32s-32 14.3-32 32v160c0 17.7 14.3 32 32 32s32-14.3 32-32V176zM256 48c-44.2 0-80 35.8-80 80v112c0 44.2 35.8 80 80 80s80-35.8 80-80V128c0-44.2-35.8-80-80-80zm112 192c0 57.4-44.4 104.4-100 111.4V400h40c13.3 0 24 10.7 24 24s-10.7 24-24 24H204c-13.3 0-24-10.7-24-24s10.7-24 24-24h40v-48.6c-55.6-7-100-54-100-111.4 0-13.3 10.7-24 24-24s24 10.7 24 24c0 44.2 35.8 80 80 80s80-35.8 80-80c0-13.3 10.7-24 24-24s24 10.7 24 24z'/></svg>">
    <title>SpeakLanka - Voice Translator</title>
    <meta name="description" content="SpeakLanka.AI is an advanced AI voice assistant that speaks and understands Sinhalese. Experience seamless Sinhala speech-to-text and text-to-speech.">
    <meta name="keywords" content="SpeakLanka, SpeakLanka AI, Sinhala AI, Voice Assistant Sri Lanka, Sinhala ChatBot, Groq Sinhala">
    <meta name="author" content="Nipun">

    <meta name="google-site-verification" content="8xwBERH1UWRfrhUOigPvj8lvBkeUmpXXQKE55qsg_-w" />

    <link rel="stylesheet" href="{{ url_with_static_path if url_for else '' }}/static/style.css" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fa-solid fa-microphone-lines"></i> SpeakLanka AI</h1>
        <p class="subtitle">Sinhala ↔ English Voice Translator</p>
        
        <div class="lang-controls">
            <span id="src-label" class="active-lang">English</span>
            <button id="switch-btn" class="icon-btn"><i class="fa-solid fa-right-left"></i></button>
            <span id="target-label">Sinhala</span>
        </div>

        <div class="translator-box">
            <div class="box-input">
                <textarea id="input-text" placeholder="Type something or use the mic..."></textarea>
                <div class="action-bar">
                    <div style="display: flex; gap: 8px;">
                        <button id="mic-btn" class="action-btn mic-off"><i class="fa-solid fa-microphone"></i></button>
                        <button id="upload-btn" class="action-btn" style="background: #22c55e;"><i class="fa-solid fa-image"></i></button>
                        <input type="file" id="image-file" accept="image/png, image/jpeg, image/jpg" style="display: none;">
                    </div>
                    <div>
                        <button id="translate-btn" class="main-btn">Translate</button>
                        <button id="ai-btn" class="main-btn" style="background: #a855f7; margin-left: 10px;"><i class="fa-solid fa-robot"></i> Ask AI</button>
                    </div>
                </div>
            </div>
            
            <div class="box-output">
                <div id="output-text" class="placeholder-text">Translation will appear here...</div>
                <div class="action-bar justify-end">
                    <button id="speak-btn" class="action-btn" disabled><i class="fa-solid fa-volume-high"></i></button>
                </div>
            </div>
            
        </div>
    </div>

    <script src="/static/script.js"></script>
    <audio id="bg-audio" style="display: none;"></audio>    
</body>
</html>
